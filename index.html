<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ITR Filing Tracker · F.Y. 2025-26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== Soft (cool) — default, eye-soothing ===== */
:root{
  --bg:#e8edf2; --surface:#fbfcfe; --surface2:#dbe6f1; --frow:#eaf0f6;
  --ink:#3c4858; --muted:#76838f; --line:#dee5ec; --thtx:#53627a;
  --hdr:linear-gradient(120deg,#3f6188 0%,#5a8cb5 100%);
  --brand2:#4a82b0; --hover:#e6eef7; --inputfocus:#ffffff;
  --yesb:#d6ecdb; --yest:#357a4c; --nob:#f1dada; --not:#9d524f; --nab:#f4e9c9; --nat:#84693a; --noneb:#e8edf2; --nonet:#9aa4b0;
  --banner-bg:#f7f1df; --banner-line:#eae0c2; --banner-tx:#7e6f44;
  --done-bg:#e2f0e6; --done-line:#c2dcc9;
  --o-mehul:#4a7fb5; --o-divya:#9168bf; --o-urmi:#2f9e8f; --o-khushi:#c56b94;
  --t-mehul:#eef4fa; --t-divya:#f4eefb; --t-urmi:#e8f6f3; --t-khushi:#fbeef4;
  --shadow:0 1px 2px rgba(40,60,90,.05),0 2px 8px rgba(40,60,90,.06);
  --radius:14px;
}
/* ===== Sepia (warm) — eye-soothing alternative ===== */
body.sepia{
  --bg:#efe8da; --surface:#faf6ee; --surface2:#e7dcc6; --frow:#f1ebdd;
  --ink:#4b4233; --muted:#897e69; --line:#e3d9c5; --thtx:#6e6044;
  --hdr:linear-gradient(120deg,#5c5340 0%,#8a7a55 100%);
  --brand2:#9a6f3b; --hover:#f1e8d4; --inputfocus:#fffaf0;
  --yesb:#dbe8c8; --yest:#4f6b2e; --nob:#eed7cf; --not:#9a5340; --nab:#f0e3bb; --nat:#806216; --noneb:#efe8da; --nonet:#9a8f78;
  --banner-bg:#f3ead0; --banner-line:#e4d7b4; --banner-tx:#7e6a3a;
  --done-bg:#e5edd3; --done-line:#cfddb2;
  --o-mehul:#5a7c9e; --o-divya:#8f6aa8; --o-urmi:#4f927f; --o-khushi:#b56e88;
  --t-mehul:#ecf1f4; --t-divya:#f2ecf3; --t-urmi:#e9f2ed; --t-khushi:#f7ecee;
  --shadow:0 1px 2px rgba(90,75,45,.06),0 2px 8px rgba(90,75,45,.07);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:'Inter',"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;font-size:13px;-webkit-font-smoothing:antialiased}
.hidden{display:none!important}

header{background:var(--hdr);color:#fff;padding:18px 16px;position:relative;text-align:center}
.logo{position:absolute;left:20px;top:50%;transform:translateY(-50%);width:46px;height:46px;border-radius:13px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;letter-spacing:.5px}
header .title{font-size:25px;font-weight:800;letter-spacing:.3px;line-height:1.1}
header .sub{font-size:13.5px;font-weight:500;opacity:.92;margin-top:3px;letter-spacing:.2px}
.head-right{position:absolute;right:20px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:12px}
.themebtn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;width:34px;height:34px;border-radius:10px;cursor:pointer;font-size:15px;line-height:1}
.themebtn:hover{background:rgba(255,255,255,.3)}
.presence{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;opacity:.95}
.dot{width:8px;height:8px;border-radius:50%;background:#7fdca6;box-shadow:0 0 0 3px rgba(127,220,166,.25)}
.avatars{display:flex}
.avatars span{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:600;border:2px solid rgba(255,255,255,.5);margin-left:-7px;background:#e7eef6;color:#3f6188}

.banner{background:var(--banner-bg);border-bottom:1px solid var(--banner-line);color:var(--banner-tx);font-size:12px;padding:6px 16px;text-align:center}

.wrap{padding:16px 20px 36px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:13px 16px;box-shadow:var(--shadow);display:flex;align-items:center;gap:13px}
.kpi .ic{width:42px;height:42px;border-radius:12px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;opacity:.9}
.kpi .ic svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.kpi.t .ic{background:#5a8cb5} .kpi.g .ic{background:#5aa777} .kpi.a .ic{background:#d3ad57} .kpi.m .ic{background:#9aa6b2}
.kpi .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.kpi .val{font-size:26px;font-weight:800;line-height:1.1;margin-top:2px;color:var(--brand2)}
.kpi.g .val{color:#3f8a59} .kpi.a .val{color:#b58a32} .kpi.m .val{color:var(--muted)}

.sec{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin:2px 2px 7px}
.pipe{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:16px}
.pipe .st{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:9px 8px 8px;box-shadow:var(--shadow);position:relative}
.pipe .st .stnum{position:absolute;top:7px;right:9px;font-size:9.5px;font-weight:700;color:var(--muted);opacity:.5}
.pipe .st .n{font-size:20px;font-weight:800;line-height:1;color:var(--brand2)}
.pipe .st .t{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.2;font-weight:500}
.pipe .st .bar{height:5px;border-radius:4px;background:var(--noneb);margin-top:7px;overflow:hidden}
.pipe .st .bar i{display:block;height:100%;background:var(--brand2);opacity:.85;border-radius:4px}
.pipe .st .pct{font-size:9.5px;color:var(--muted);margin-top:3px;font-weight:600;opacity:.85}
.pipe .st.done{background:var(--done-bg);border-color:var(--done-line)}
.pipe .st.done .n{color:#3f8a59} .pipe .st.done .t{color:#3f8a59} .pipe .st.done .bar i{background:#5aa777;opacity:1}

.toolbar{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:9px}
.search{position:relative;flex:1;min-width:210px}
.search input{width:100%;height:38px;border:1px solid var(--line);border-radius:11px;padding:0 12px 0 36px;font-size:13px;background:var(--surface);color:var(--ink);box-shadow:var(--shadow);font-family:inherit}
.search svg{position:absolute;left:12px;top:11px;width:16px;height:16px;stroke:var(--muted);fill:none}
.toolbar select{height:38px;border:1px solid var(--line);border-radius:11px;padding:0 11px;font-size:12.5px;background:var(--surface);color:var(--ink);box-shadow:var(--shadow);font-family:inherit}
.btn{height:38px;border:1px solid var(--line);background:var(--surface);border-radius:11px;padding:0 14px;font-size:12.5px;font-weight:500;cursor:pointer;color:var(--ink);box-shadow:var(--shadow);font-family:inherit}
.btn:hover{border-color:var(--brand2);color:var(--brand2)}
.btn.add{background:var(--brand2);color:#fff;border-color:var(--brand2)} .btn.add:hover{filter:brightness(.95);color:#fff}
.count{font-size:12px;color:var(--muted);font-weight:500}

.legend{display:flex;gap:15px;align-items:center;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin:0 2px 9px;font-weight:500}
.legend b{color:var(--ink);font-weight:600}
.legend span{display:flex;align-items:center;gap:5px}
.legend i{width:12px;height:12px;border-radius:3px;display:inline-block}

.tablewrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:auto;max-height:72vh;box-shadow:var(--shadow)}
table{border-collapse:separate;border-spacing:0;width:100%;font-size:12.5px;min-width:1220px}
th,td{padding:4px 9px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}
thead th{background:var(--surface2);font-weight:700;color:var(--thtx);font-size:11px;text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--line)}
thead tr.hrow th{position:sticky;top:0;z-index:4;height:30px}
thead tr.frow th{position:sticky;top:30px;z-index:4;background:var(--frow);padding:3px 6px}
.cfile{box-sizing:border-box;width:66px;min-width:66px;max-width:66px}
td.cfile,thead .cfile{position:sticky;left:0;z-index:2;background:var(--surface)}
td.cname,thead .cname{position:sticky;left:66px;z-index:2;background:var(--surface);min-width:175px;white-space:normal}
thead tr.hrow .cfile,thead tr.hrow .cname{z-index:6;background:var(--surface2);top:0}
thead tr.frow .cfile,thead tr.frow .cname{z-index:6;background:var(--frow);top:30px}
th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
th.sortable:hover{color:var(--brand2)}
.ar{font-size:10px;color:var(--brand2);margin-left:2px}
.ms-btn{width:100%;height:24px;border:1px solid var(--line);border-radius:7px;font-size:11px;padding:0 16px 0 6px;background:var(--surface);color:var(--ink);box-sizing:border-box;cursor:pointer;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:inherit;position:relative}
.ms-btn::after{content:'▾';position:absolute;right:5px;top:5px;font-size:8px;color:var(--muted)}
.ms-btn.act{border-color:var(--brand2);color:var(--brand2);font-weight:600}
.fcol{width:100%;height:24px;border:1px solid var(--line);border-radius:7px;font-size:11px;padding:0 5px;background:var(--surface);color:var(--ink);box-sizing:border-box;font-family:inherit}
#mspop{position:fixed;z-index:60;background:var(--surface);border:1px solid var(--line);border-radius:9px;box-shadow:var(--shadow);padding:5px;max-height:250px;overflow:auto;min-width:140px}
#mspop label{display:flex;align-items:center;gap:8px;padding:5px 8px;font-size:12px;border-radius:6px;cursor:pointer;color:var(--ink);white-space:nowrap;text-transform:none;letter-spacing:0}
#mspop label:hover{background:var(--hover)}
#mspop input{margin:0;width:14px;height:14px;accent-color:var(--brand2)}
tbody td{background:var(--surface)}
tbody tr[data-o="Mehul"] td{background:var(--t-mehul)}
tbody tr[data-o="Divya"] td{background:var(--t-divya)}
tbody tr[data-o="Urmi"] td{background:var(--t-urmi)}
tbody tr[data-o="Khushi"] td{background:var(--t-khushi)}
tbody tr[data-o="Mehul"] td.cfile{box-shadow:inset 4px 0 0 var(--o-mehul)}
tbody tr[data-o="Divya"] td.cfile{box-shadow:inset 4px 0 0 var(--o-divya)}
tbody tr[data-o="Urmi"] td.cfile{box-shadow:inset 4px 0 0 var(--o-urmi)}
tbody tr[data-o="Khushi"] td.cfile{box-shadow:inset 4px 0 0 var(--o-khushi)}
tbody tr:hover td{background:var(--hover)!important}
.flash td{animation:fl 1.6s ease}
@keyframes fl{0%{background:#fdf0c4}100%{background:transparent}}

select.st-sel{appearance:none;border:1px solid transparent;border-radius:20px;height:25px;padding:0 18px 0 10px;
  font-size:11.5px;font-weight:600;cursor:pointer;min-width:54px;font-family:inherit;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='9' height='9' viewBox='0 0 24 24' fill='none' stroke='%23999' stroke-width='3'><path d='M6 9l6 6 6-6'/></svg>");
  background-repeat:no-repeat;background-position:right 6px center}
.st-Yes{background-color:var(--yesb);color:var(--yest)}
.st-No{background-color:var(--nob);color:var(--not)}
.st-NA{background-color:var(--nab);color:var(--nat)}
.st-none{background-color:var(--noneb);color:var(--nonet)}
select.own-sel{border:1px solid var(--line);border-radius:8px;height:25px;padding:0 7px;font-size:11.5px;background:var(--surface);color:var(--ink);font-family:inherit}
input.cell{border:1px solid transparent;border-radius:7px;height:25px;padding:0 7px;font-size:11.5px;width:90px;background:transparent;color:var(--ink);font-family:inherit}
input.cell::placeholder{color:var(--muted);opacity:.7}
input.cell:hover{border-color:var(--line)} input.cell:focus{border-color:var(--brand2);outline:none;background:var(--inputfocus);box-shadow:0 0 0 2px rgba(74,130,176,.18)}
input.ctin{width:185px}
input.rmk{width:175px}
input.cfin{width:58px;font-weight:700;color:var(--brand2)}
input.cnin{width:100%;min-width:155px;font-weight:600}
button.del{border:1px solid var(--line);background:var(--surface);color:var(--not);border-radius:8px;width:24px;height:24px;font-size:12px;line-height:1;padding:0;cursor:pointer}
button.del:hover{background:var(--nob);border-color:var(--not)}
th.actc,td.actc{width:38px;min-width:38px;text-align:center}
@media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr)}.pipe{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="logo">MSJ</div>
    <div class="brand">
      <div class="title">ITR Filing Tracker</div>
      <div class="sub">M. S. Joshi &amp; Co. · F.Y. 2025-26</div>
    </div>
    <div class="head-right">
      <button class="themebtn" id="themeBtn" title="Change theme">☀</button>
      <div class="presence"><span class="dot"></span><span id="presenceTxt" title="Click to set your name" style="cursor:pointer" onclick="renameMe()">Connecting…</span>
        <div class="avatars" id="avatars"></div>
      </div>
    </div>
  </header>

  <div class="banner" id="modeBanner"></div>

  <div class="wrap">
    <div class="kpis">
      <div class="kpi t"><div class="ic"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><div><div class="lbl" id="lblTotal">Total clients</div><div class="val" id="kTotal">0</div></div></div>
      <div class="kpi g"><div class="ic"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><div><div class="lbl">Filed</div><div class="val" id="kFiled">0</div></div></div>
      <div class="kpi a"><div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div><div class="lbl">In progress</div><div class="val" id="kProg">0</div></div></div>
      <div class="kpi m"><div class="ic"><svg viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></div><div><div class="lbl">Not started</div><div class="val" id="kNew">0</div></div></div>
    </div>

    <div class="sec" id="pipeSec">Pipeline by stage</div>
    <div class="pipe" id="pipe"></div>

    <div class="toolbar">
      <div class="search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="q" placeholder="Search file no, client or contact…"/>
      </div>
      <select id="fStage">
        <option value="">All clients</option>
        <option value="notstarted">Not started</option>
        <option value="progress">In progress</option>
        <option value="filed">Filed</option>
      </select>
      <button class="btn" id="clearBtn">Clear filters</button>
      <button class="btn add" id="addBtn">+ Add client</button>
      <button class="btn" id="exportBtn">Export CSV</button>
      <span class="count" id="count"></span>
    </div>

    <div class="legend">
      <b>Owner:</b>
      <span><i style="background:var(--o-mehul)"></i>Mehul</span>
      <span><i style="background:var(--o-divya)"></i>Divya</span>
      <span><i style="background:var(--o-urmi)"></i>Urmi</span>
      <span><i style="background:var(--o-khushi)"></i>Khushi</span>
      <span><i style="background:var(--noneb)"></i>Unassigned</span>
    </div>

    <div class="tablewrap">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>
<div id="mspop" class="hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   CONFIG — Supabase project (open access, no login required)
   ============================================================ */
const SUPABASE_URL      = "https://qrrgvxoiehbfwqfqjrwo.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_XqKDKRw-bHa-tUclzZwW9A_K09nhIvY";

const STAGES=[
  ["data_received","Data rcd"],["data_written","Data written"],["tb_ready","TB ready"],
  ["tb_fed","TB fed"],["comp_ready","Comp ready"],["tax_paid","Tax paid"],["filed","Filed"]
];
const OWNERS=["Mehul","Divya","Urmi","Khushi"];

const COLS=[
  {k:'code',label:'File No.',type:'text'},
  {k:'name',label:'Client',type:'text'},
  {k:'contact',label:'Contact',type:'text'},
  {k:'itr_type',label:'Type',type:'enum'},
  {k:'data_received',label:'Data rcd',type:'status'},
  {k:'data_written',label:'Data written',type:'status'},
  {k:'tb_ready',label:'TB ready',type:'status'},
  {k:'tb_fed',label:'TB fed',type:'status'},
  {k:'comp_ready',label:'Comp ready',type:'status'},
  {k:'tax_paid',label:'Tax paid',type:'status'},
  {k:'filed',label:'Filed',type:'status'},
  {k:'fees',label:'Fees',type:'text'},
  {k:'fees_received',label:'Fees rcvd',type:'text'},
  {k:'owner',label:'Owner',type:'enum'},
  {k:'remarks',label:'Remarks',type:'text'}
];

let sb=null, rows=[], me="", channel=null;
const DEFAULT_SORT={k:'contact',dir:1};
let sort={k:'contact',dir:1};
const colFilters={};
let headBuilt=false, msOpenCol=null;
const statusRank={Yes:0,No:1,NA:2,"":3};

const THEMES=['soft','sepia']; const THEME_ICON={soft:'☀',sepia:'◑'};
function applyTheme(t){ if(!THEMES.includes(t)) t='soft'; document.body.classList.remove('sepia'); if(t!=='soft') document.body.classList.add(t); const b=document.getElementById('themeBtn'); if(b){ b.textContent=THEME_ICON[t]; b.title=(t==='soft'?'Soft (cool)':'Sepia (warm)')+' — click to change'; } localStorage.setItem('itr_theme',t); }

window.addEventListener("DOMContentLoaded", ()=>{
  applyTheme(localStorage.getItem('itr_theme'));
  document.getElementById('themeBtn').addEventListener('click', ()=>{ const cur=THEMES.includes(localStorage.getItem('itr_theme'))?localStorage.getItem('itr_theme'):'soft'; applyTheme(THEMES[(THEMES.indexOf(cur)+1)%THEMES.length]); });
  me=getName();
  sb=supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  document.getElementById("modeBanner").textContent="Live — anyone with the link can view and edit. Changes save automatically and sync to everyone.";
  document.getElementById("clearBtn").addEventListener("click", clearFilters);
  document.getElementById("addBtn").addEventListener("click", addClient);
  document.getElementById("exportBtn").addEventListener("click", exportCsv);
  document.querySelector(".tablewrap").addEventListener("scroll", closeMs);
  window.addEventListener("resize", closeMs);
  loadCloud().then(subscribeRealtime);
});

function getName(){
  let n=localStorage.getItem("itr_name");
  if(!n){ n="User-"+Math.floor(Math.random()*9000+1000); localStorage.setItem("itr_name",n); }
  return n;
}
function renameMe(){
  const n=(prompt("Your name (shown to teammates while you edit):", me)||"").trim();
  if(n){ me=n; localStorage.setItem("itr_name",n); if(channel){ channel.track({name:me,at:Date.now()}); } }
}

async function loadCloud(){
  const {data,error}=await sb.from("clients").select("*").order("sort_name");
  if(error){ document.getElementById("modeBanner").textContent="Load error: "+error.message; return; }
  rows=data||[]; renderAll();
}
function subscribeRealtime(){
  channel=sb.channel("clients-room",{config:{presence:{key:me}}});
  channel.on("postgres_changes",{event:"*",schema:"public",table:"clients"},(payload)=>{
    if(payload.eventType==="DELETE"){ rows=rows.filter(x=>x.id!==payload.old.id); renderAll(); return; }
    const r=payload.new; const i=rows.findIndex(x=>x.id===r.id);
    if(i>=0) rows[i]=r; else rows.push(r);
    renderAll(r&&r.id);
  });
  channel.on("presence",{event:"sync"},()=>{
    const names=Object.keys(channel.presenceState());
    document.getElementById("presenceTxt").textContent=names.length+" online";
    const av=document.getElementById("avatars"); av.innerHTML="";
    names.slice(0,6).forEach(nm=>{const s=document.createElement("span");s.textContent=initials(nm);s.title=nm;av.appendChild(s);});
  });
  channel.subscribe(async(status)=>{ if(status==="SUBSCRIBED"){ await channel.track({name:me,at:Date.now()}); }});
}
function initials(s){s=String(s).replace(/[._-]/g," ").trim();const p=s.split(/\s+/);
  const r=p.length>1?((p[0][0]||"")+(p[1][0]||"")):s.slice(0,2); return (r||"?").toUpperCase();}

async function setField(id,field,value){
  const i=rows.findIndex(r=>r.id===id); if(i<0) return;
  rows[i][field]=value; computeKpis();
  if(field==='owner'){ const tr=document.querySelector('tr[data-id-row="'+id+'"]'); if(tr) tr.setAttribute('data-o', value||''); }
  const patch={}; patch[field]=value; patch.updated_at=new Date().toISOString(); patch.updated_by=me;
  const {error}=await sb.from("clients").update(patch).eq("id",id);
  if(error) alert("Save error: "+error.message);
}
async function deleteRow(id){
  const r=rows.find(x=>x.id===id); if(!r) return;
  if(!confirm("Delete this client permanently?\n\nFile No.: "+(r.code||"—")+"\nClient: "+(r.name||"—"))) return;
  const {error}=await sb.from("clients").delete().eq("id",id);
  if(error){ alert("Delete error: "+error.message); return; }
  rows=rows.filter(x=>x.id!==id); renderAll();
}

/* ===== Multi-select column filters ===== */
function msOptions(col){
  const c=COLS.find(x=>x.k===col);
  if(c.type==='status') return [['Yes','Yes'],['No','No'],['NA','NA'],['__blank','(Blank)']];
  const base=distinct(col).map(v=>[v,v]);
  base.push(col==='owner'?['__none','Unassigned']:['__blank','(Blank)']);
  return base;
}
function msLabel(col){
  const sel=colFilters[col];
  if(!Array.isArray(sel)||!sel.length) return 'All';
  const map=Object.fromEntries(msOptions(col));
  const names=sel.map(t=>map[t]||t);
  return names.length<=2 ? names.join(', ') : names.length+' selected';
}
function updateMsBtn(col){ const b=document.querySelector('.ms-btn[data-col="'+col+'"]'); if(b){ b.textContent=msLabel(col); b.classList.toggle('act', Array.isArray(colFilters[col])&&colFilters[col].length>0); } }
function openMs(btn){
  const col=btn.dataset.col; msOpenCol=col;
  const pop=document.getElementById('mspop');
  const sel=Array.isArray(colFilters[col])?colFilters[col]:[];
  pop.innerHTML=msOptions(col).map(([v,t])=>`<label><input type="checkbox" value="${esc(v)}"${sel.includes(v)?' checked':''}>${esc(t)}</label>`).join('');
  const r=btn.getBoundingClientRect();
  pop.style.left=Math.max(6,Math.min(r.left, window.innerWidth-186))+'px';
  pop.style.top=(r.bottom+3)+'px';
  pop.classList.remove('hidden');
}
function closeMs(){ const p=document.getElementById('mspop'); if(p) p.classList.add('hidden'); msOpenCol=null; }

/* ===== Header (sortable) + per-column filters ===== */
function colClass(k){ return k==='code'?'cfile ':(k==='name'?'cname ':''); }
function distinct(k){return [...new Set(rows.map(r=>(r[k]==null?"":String(r[k])).trim()).filter(v=>v))].sort();}
function buildHead(){
  const thead=document.getElementById("thead"); let h="<tr class='hrow'>";
  for(const c of COLS){ h+=`<th class="${colClass(c.k)}sortable" data-col="${c.k}">${c.label}<span class="ar"></span></th>`; }
  h+="<th class='actc'></th></tr><tr class='frow'>";
  for(const c of COLS){
    const ctl = c.type==='text'
      ? `<input class="fcol ft" data-col="${c.k}" placeholder="filter"/>`
      : `<button type="button" class="ms-btn" data-col="${c.k}">All</button>`;
    h+=`<th class="${colClass(c.k)}fcell">${ctl}</th>`;
  }
  h+="<th class='actc'></th></tr>"; thead.innerHTML=h;
  document.querySelectorAll("input.fcol").forEach(el=>{ if(colFilters[el.dataset.col]!=null) el.value=colFilters[el.dataset.col]; });
  COLS.forEach(c=>{ if(c.type!=='text') updateMsBtn(c.k); });
  updateSortArrows();
}
function updateSortArrows(){ document.querySelectorAll("th[data-col]").forEach(th=>{ const s=th.querySelector(".ar"); if(s) s.textContent = sort.k===th.dataset.col ? (sort.dir>0?" ▲":" ▼") : ""; }); }
function sortRows(list){
  if(!sort.k) return list; const c=COLS.find(x=>x.k===sort.k); if(!c) return list;
  return list.slice().sort((a,b)=>{
    let x=a[c.k], y=b[c.k];
    if(c.type==='status') return ((statusRank[x||""]??9)-(statusRank[y||""]??9))*sort.dir;
    x=(x==null?"":String(x)); y=(y==null?"":String(y));
    if(c.k==='fees'||c.k==='fees_received'){ const nx=parseFloat(x.replace(/[^0-9.\-]/g,"")), ny=parseFloat(y.replace(/[^0-9.\-]/g,"")); const hx=!isNaN(nx),hy=!isNaN(ny); if(hx||hy){ if(!hx)return 1; if(!hy)return -1; return (nx-ny)*sort.dir; } }
    if(x===""&&y!=="") return 1; if(y===""&&x!=="") return -1;
    return x.localeCompare(y)*sort.dir;
  });
}
function filtered(){
  const q=document.getElementById("q").value.trim().toLowerCase();
  const fs=document.getElementById("fStage").value;
  return rows.filter(r=>{
    if(q){const hay=((r.code||"")+" "+(r.name||"")+" "+(r.contact||"")).toLowerCase();if(!hay.includes(q))return false;}
    if(fs==="filed"){ if(r.filed!=="Yes") return false; }
    else if(fs==="notstarted"){ if(r.data_received==="Yes") return false; }
    else if(fs==="progress"){ if(!(r.data_received==="Yes"&&r.filed!=="Yes")) return false; }
    for(const c of COLS){
      const fv=colFilters[c.k]; if(!fv) continue;
      const cell=(r[c.k]==null?"":String(r[c.k]));
      if(c.type==='text'){ if(!cell.toLowerCase().includes(String(fv).toLowerCase())) return false; }
      else if(Array.isArray(fv) && fv.length){
        const ok=fv.some(t=>(t==='__blank'||t==='__none')?cell.trim()==="":cell===t);
        if(!ok) return false;
      }
    }
    return true;
  });
}

/* ===== Rendering ===== */
function val(r,f){return r[f]||"";}
function statusClass(v){return v==="Yes"?"st-Yes":v==="No"?"st-No":v==="NA"?"st-NA":"st-none";}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function renderTable(flashId){
  const tb=document.getElementById("tbody"); const list=sortRows(filtered());
  tb.innerHTML="";
  for(const r of list){
    const tr=document.createElement("tr"); if(flashId&&r.id===flashId) tr.className="flash";
    tr.setAttribute("data-id-row", r.id); tr.setAttribute("data-o", r.owner||"");
    let cells="";
    cells+=`<td class="cfile"><input class="cell cfin" data-id="${r.id}" data-f="code" value="${esc(val(r,'code'))}" placeholder="—"/></td>`;
    cells+=`<td class="cname"><input class="cell cnin" data-id="${r.id}" data-f="name" value="${esc(val(r,'name'))}" placeholder="—"/></td>`;
    cells+=`<td><input class="cell ctin" data-id="${r.id}" data-f="contact" value="${esc(val(r,'contact'))}" placeholder="—"/></td>`;
    cells+=`<td><input class="cell" style="width:64px" data-id="${r.id}" data-f="itr_type" value="${esc(val(r,'itr_type'))}" placeholder="—"/></td>`;
    for(const [f] of STAGES){
      const v=val(r,f);
      cells+=`<td><select class="st-sel ${statusClass(v)}" data-id="${r.id}" data-f="${f}">`+
        ["","Yes","No","NA"].map(o=>`<option value="${o}"${o===v?" selected":""}>${o||"—"}</option>`).join("")+
        `</select></td>`;
    }
    cells+=`<td><input class="cell" data-id="${r.id}" data-f="fees" value="${esc(val(r,'fees'))}" placeholder="—"/></td>`;
    cells+=`<td><input class="cell" data-id="${r.id}" data-f="fees_received" value="${esc(val(r,'fees_received'))}" placeholder="—"/></td>`;
    cells+=`<td><select class="own-sel" data-id="${r.id}" data-f="owner"><option value="">Unassigned</option>`+
      OWNERS.map(o=>`<option${o===r.owner?" selected":""}>${o}</option>`).join("")+`</select></td>`;
    cells+=`<td><input class="cell rmk" data-id="${r.id}" data-f="remarks" value="${esc(val(r,'remarks'))}" placeholder="—"/></td>`;
    cells+=`<td class="actc"><button class="del" data-id="${r.id}" title="Delete this client">✕</button></td>`;
    tr.innerHTML=cells; tb.appendChild(tr);
  }
  document.getElementById("count").textContent=list.length+" of "+rows.length+" shown";
}
function computeKpis(){
  const base=filtered();
  const total=base.length;
  const filed=base.filter(r=>r.filed==="Yes").length;
  const prog=base.filter(r=>r.data_received==="Yes"&&r.filed!=="Yes").length;
  const neu=base.filter(r=>r.data_received!=="Yes").length;
  const anyFilter = !!(document.getElementById("q").value.trim() || document.getElementById("fStage").value || Object.values(colFilters).some(v=>(Array.isArray(v)?v.length:v)));
  document.getElementById("lblTotal").textContent = anyFilter ? "Clients (filtered)" : "Total clients";
  document.getElementById("pipeSec").textContent = anyFilter ? "Pipeline by stage — filtered view" : "Pipeline by stage";
  document.getElementById("kTotal").textContent=total;
  document.getElementById("kFiled").textContent=filed;
  document.getElementById("kProg").textContent=prog;
  document.getElementById("kNew").textContent=neu;
  const pipe=document.getElementById("pipe"); pipe.innerHTML="";
  STAGES.forEach(([f,label],idx)=>{
    const n=base.filter(r=>r[f]==="Yes").length;
    const pct=total?Math.round(n/total*100):0;
    const done=idx===STAGES.length-1;
    pipe.innerHTML+=`<div class="st${done?' done':''}"><div class="stnum">${idx+1}</div><div class="n">${n}</div><div class="t">${label}</div>`+
      `<div class="bar"><i style="width:${pct}%"></i></div><div class="pct">${pct}%</div></div>`;
  });
}
function renderAll(flashId){ if(!headBuilt){ buildHead(); headBuilt=true; } computeKpis(); renderTable(flashId); }

/* ===== Events ===== */
document.addEventListener("change",(e)=>{
  const el=e.target;
  if(el.matches(".st-sel")){ el.className="st-sel "+statusClass(el.value); setField(+el.dataset.id,el.dataset.f,el.value); }
  else if(el.matches(".own-sel")){ setField(+el.dataset.id,el.dataset.f,el.value||null); }
  else if(el.closest && el.closest("#mspop")){ const col=msOpenCol; if(!col) return; const vals=[...document.querySelectorAll('#mspop input:checked')].map(i=>i.value); if(vals.length) colFilters[col]=vals; else delete colFilters[col]; updateMsBtn(col); computeKpis(); renderTable(); }
  else if(el.matches("#fStage")){ computeKpis(); renderTable(); }
});
document.addEventListener("input",(e)=>{
  const el=e.target;
  if(el.matches("input.fcol")){ const v=el.value.trim(); if(v) colFilters[el.dataset.col]=v; else delete colFilters[el.dataset.col]; computeKpis(); renderTable(); }
  else if(el.matches("#q")){ computeKpis(); renderTable(); }
});
document.addEventListener("blur",(e)=>{
  const el=e.target;
  if(el.matches("input.cell")) setField(+el.dataset.id,el.dataset.f,el.value.trim()||null);
},true);
document.addEventListener("click",(e)=>{
  const msb=e.target.closest && e.target.closest(".ms-btn");
  if(msb){ if(msOpenCol===msb.dataset.col) closeMs(); else openMs(msb); return; }
  if(!(e.target.closest && e.target.closest("#mspop"))) closeMs();
  const del=e.target.closest && e.target.closest("button.del");
  if(del){ deleteRow(+del.dataset.id); return; }
  const th=e.target.closest && e.target.closest("th[data-col]");
  if(th){ const k=th.dataset.col; if(sort.k===k){ sort.dir=-sort.dir; } else { sort.k=k; sort.dir=1; } updateSortArrows(); renderTable(); }
});
function clearFilters(){ for(const k in colFilters) delete colFilters[k]; sort={k:DEFAULT_SORT.k,dir:DEFAULT_SORT.dir};
  document.getElementById("q").value=""; document.getElementById("fStage").value="";
  document.querySelectorAll("input.fcol").forEach(el=>el.value="");
  COLS.forEach(c=>{ if(c.type!=='text') updateMsBtn(c.k); });
  closeMs(); updateSortArrows(); computeKpis(); renderTable(); }

async function addClient(){
  const code=prompt("File No. (e.g. M1779):")||null;
  const name=prompt("Client name:"); if(!name) return;
  const base={code,name,contact:null,itr_type:"ITR",data_received:null,data_written:null,tb_ready:null,
    tb_fed:null,comp_ready:null,tax_paid:null,filed:null,fees:null,fees_received:null,owner:null,remarks:null};
  const {data,error}=await sb.from("clients").insert(base).select().single();
  if(error){ alert(error.message); return; }
  rows.push(data); document.getElementById("q").value=""; headBuilt=false; renderAll(data.id);
}
function exportCsv(){
  const cols=["code","name","contact","itr_type",...STAGES.map(s=>s[0]),"fees","fees_received","owner","remarks"];
  const head=["File No.","Name","Contact","Type","Data rcd","Data written","TB ready","TB fed","Comp ready","Tax paid","Filed","Fees","Fees rcvd","Owner","Remarks"];
  const csv=[head.join(",")].concat(rows.map(r=>cols.map(c=>{
    const v=(r[c]==null?"":String(r[c])); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;
  }).join(","))).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download="ITR_filing_export.csv"; a.click();
}
</script>
