<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ITR Filing Tracker · A.Y. 2025-26</title>
<style>
:root{
  --bg:#f4f6f8; --surface:#ffffff; --ink:#1f2733; --muted:#6b7785; --line:#e3e8ee;
  --brand:#13315c; --brand2:#1f6feb;
  --yes-bg:#c6efce; --yes-tx:#1b5e20;
  --no-bg:#ffc7ce;  --no-tx:#b3261e;
  --na-bg:#ffeb9c;  --na-tx:#7a5b00;
  --none-bg:#eef1f4; --none-tx:#8b95a1;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:"Segoe UI",Calibri,system-ui,-apple-system,Roboto,Arial,sans-serif;font-size:14px}
.hidden{display:none!important}

header{background:var(--brand);color:#fff;padding:12px 18px;display:flex;align-items:center;
  justify-content:space-between;flex-wrap:wrap;gap:10px}
header .title{font-size:16px;font-weight:600}
header .sub{font-size:12px;opacity:.8}
.head-right{display:flex;align-items:center;gap:14px}
.presence{display:flex;align-items:center;gap:7px;font-size:12px;opacity:.95}
.dot{width:8px;height:8px;border-radius:50%;background:#36d399}
.avatars{display:flex}
.avatars span{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;border:2px solid var(--brand);margin-left:-7px;background:#dbe6f5;color:#13315c}

.banner{background:#fff6da;border-bottom:1px solid #f0e0a8;color:#7a5b00;font-size:12.5px;padding:7px 18px}

.wrap{padding:16px 18px 40px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
.kpi .lbl{font-size:12px;color:var(--muted)}
.kpi .val{font-size:25px;font-weight:700;margin-top:3px}
.kpi.g .val{color:var(--yes-tx)} .kpi.a .val{color:var(--na-tx)} .kpi.m .val{color:var(--muted)}

.section-lbl{font-size:12px;color:var(--muted);margin:6px 0 8px;text-transform:uppercase;letter-spacing:.04em}
.pipe{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:18px}
.pipe .st{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:10px 6px;text-align:center}
.pipe .st .n{font-size:19px;font-weight:700}
.pipe .st .t{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.2}
.pipe .st.done{background:var(--yes-bg);border-color:#a9dfb4}
.pipe .st.done .n{color:var(--yes-tx)} .pipe .st.done .t{color:var(--yes-tx)}
.pipe .st .bar{height:4px;border-radius:3px;background:var(--none-bg);margin-top:7px;overflow:hidden}
.pipe .st .bar i{display:block;height:100%;background:var(--brand2)}

.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.search{position:relative;flex:1;min-width:200px}
.search input{width:100%;height:38px;border:1px solid var(--line);border-radius:10px;padding:0 12px 0 34px;font-size:14px;background:var(--surface)}
.search svg{position:absolute;left:11px;top:11px;width:16px;height:16px;stroke:var(--muted);fill:none}
.toolbar select{height:38px;border:1px solid var(--line);border-radius:10px;padding:0 10px;font-size:13px;background:var(--surface)}
.btn{height:38px;border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:0 14px;font-size:13px;cursor:pointer;color:var(--ink)}
.btn:hover{background:#eef3fb;border-color:#cdddf5}
.count{font-size:12.5px;color:var(--muted)}

.tablewrap{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:auto;max-height:64vh}
table{border-collapse:separate;border-spacing:0;width:100%;font-size:13px;min-width:1120px}
th,td{padding:8px 10px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}
thead th{background:#f7f9fb;font-weight:600;color:#56636f;font-size:12px;border-bottom:1px solid var(--line)}
thead tr.hrow th{position:sticky;top:0;z-index:4;height:30px}
thead tr.frow th{position:sticky;top:30px;z-index:4;background:#fff;padding:4px 6px}
td.name,th.name{position:sticky;left:0;background:var(--surface);z-index:2;min-width:210px;white-space:normal}
thead tr.hrow th.name{z-index:6;background:#f7f9fb;top:0}
thead tr.frow th.name{z-index:6;background:#fff;top:30px}
th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
th.sortable:hover{color:var(--ink)}
.ar{font-size:10px;color:var(--brand2);margin-left:2px}
.fcol{width:100%;height:26px;border:1px solid var(--line);border-radius:6px;font-size:11.5px;padding:0 4px;background:var(--surface);box-sizing:border-box}
.name .nm{font-weight:600}
.name .cd{font-size:11.5px;color:var(--muted)}
tr:hover td{background:#fafcff}
tr:hover td.name{background:#fafcff}
.flash td{animation:fl 1.6s ease}
@keyframes fl{0%{background:#fff3bf}100%{background:transparent}}

select.st-sel{appearance:none;border:1px solid transparent;border-radius:7px;height:30px;padding:0 22px 0 9px;
  font-size:12.5px;font-weight:600;cursor:pointer;min-width:62px;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%23667' stroke-width='3'><path d='M6 9l6 6 6-6'/></svg>");
  background-repeat:no-repeat;background-position:right 7px center}
.st-Yes{background-color:var(--yes-bg);color:var(--yes-tx)}
.st-No{background-color:var(--no-bg);color:var(--no-tx)}
.st-NA{background-color:var(--na-bg);color:var(--na-tx)}
.st-none{background-color:var(--none-bg);color:var(--none-tx)}
select.own-sel{border:1px solid var(--line);border-radius:7px;height:30px;padding:0 8px;font-size:12.5px;background:var(--surface)}
input.cell{border:1px solid transparent;border-radius:7px;height:30px;padding:0 8px;font-size:12.5px;width:120px;background:transparent}
input.cell:hover{border-color:var(--line)} input.cell:focus{border-color:var(--brand2);outline:none;background:#fff}
input.rmk{width:200px}
@media(max-width:720px){.kpis{grid-template-columns:repeat(2,1fr)}.pipe{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>

<div id="app">
  <header>
    <div>
      <div class="title">ITR Filing Tracker</div>
      <div class="sub">M. S. Joshi &amp; Co. · A.Y. 2025-26</div>
    </div>
    <div class="head-right">
      <div class="presence"><span class="dot"></span><span id="presenceTxt" title="Click to set your name" style="cursor:pointer" onclick="renameMe()">Connecting…</span>
        <div class="avatars" id="avatars"></div>
      </div>
    </div>
  </header>

  <div class="banner" id="modeBanner"></div>

  <div class="wrap">
    <div class="kpis">
      <div class="kpi"><div class="lbl">Total clients</div><div class="val" id="kTotal">0</div></div>
      <div class="kpi g"><div class="lbl">Filed</div><div class="val" id="kFiled">0</div></div>
      <div class="kpi a"><div class="lbl">In progress</div><div class="val" id="kProg">0</div></div>
      <div class="kpi m"><div class="lbl">Not started</div><div class="val" id="kNew">0</div></div>
    </div>

    <div class="section-lbl">Pipeline by stage</div>
    <div class="pipe" id="pipe"></div>

    <div class="toolbar">
      <div class="search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="q" placeholder="Search client, code or contact…"/>
      </div>
      <select id="fStage">
        <option value="">All clients</option>
        <option value="notstarted">Not started</option>
        <option value="progress">In progress</option>
        <option value="filed">Filed</option>
      </select>
      <button class="btn" id="clearBtn">Clear filters</button>
      <button class="btn" id="addBtn">+ Add client</button>
      <button class="btn" id="exportBtn">Export CSV</button>
      <span class="count" id="count"></span>
    </div>

    <div class="tablewrap">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   CONFIG — Supabase project (open access, no login required)
   ============================================================ */
const SUPABASE_URL      = "https://qrrgvxoiehbfwqfqjrwo.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_XqKDKRw-bHa-tUclzZwW9A_K09nhIvY";

const STAGES=[
  ["data_received","Data rcd"],["data_written","Data written"],["tb_ready","TB ready"],
  ["tb_fed","TB fed"],["comp_ready","Comp ready"],["tax_paid","Tax paid"],["filed","Filed"]
];
const OWNERS=["Mehul","Divya","Urmi","Khushi"];

const COLS=[
  {k:'name',label:'Client',type:'text'},
  {k:'contact',label:'Contact',type:'text'},
  {k:'itr_type',label:'Type',type:'enum'},
  {k:'data_received',label:'Data rcd',type:'status'},
  {k:'data_written',label:'Data written',type:'status'},
  {k:'tb_ready',label:'TB ready',type:'status'},
  {k:'tb_fed',label:'TB fed',type:'status'},
  {k:'comp_ready',label:'Comp ready',type:'status'},
  {k:'tax_paid',label:'Tax paid',type:'status'},
  {k:'filed',label:'Filed',type:'status'},
  {k:'fees',label:'Fees',type:'text'},
  {k:'fees_received',label:'Fees rcvd',type:'text'},
  {k:'owner',label:'Owner',type:'enum'},
  {k:'remarks',label:'Remarks',type:'text'}
];

let sb=null, rows=[], me="", channel=null;
let sort={k:null,dir:1};
const colFilters={};
let headBuilt=false;
const statusRank={Yes:0,No:1,NA:2,"":3};

/* ===== Boot ===== */
window.addEventListener("DOMContentLoaded", ()=>{
  me=getName();
  sb=supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  document.getElementById("modeBanner").textContent="Live — anyone with the link can view and edit. Changes sync to everyone instantly.";
  document.getElementById("clearBtn").addEventListener("click", clearFilters);
  document.getElementById("addBtn").addEventListener("click", addClient);
  document.getElementById("exportBtn").addEventListener("click", exportCsv);
  loadCloud().then(subscribeRealtime);
});

function getName(){
  let n=localStorage.getItem("itr_name");
  if(!n){ n="User-"+Math.floor(Math.random()*9000+1000); localStorage.setItem("itr_name",n); }
  return n;
}
function renameMe(){
  const n=(prompt("Your name (shown to teammates while you edit):", me)||"").trim();
  if(n){ me=n; localStorage.setItem("itr_name",n); if(channel){ channel.track({name:me,at:Date.now()}); } }
}

async function loadCloud(){
  const {data,error}=await sb.from("clients").select("*").order("sort_name");
  if(error){ document.getElementById("modeBanner").textContent="Load error: "+error.message; return; }
  rows=data||[]; renderAll();
}
function subscribeRealtime(){
  channel=sb.channel("clients-room",{config:{presence:{key:me}}});
  channel.on("postgres_changes",{event:"*",schema:"public",table:"clients"},(payload)=>{
    const r=payload.new;
    if(payload.eventType==="UPDATE"||payload.eventType==="INSERT"){
      const i=rows.findIndex(x=>x.id===r.id);
      if(i>=0) rows[i]=r; else rows.push(r);
    } else if(payload.eventType==="DELETE"){
      rows=rows.filter(x=>x.id!==payload.old.id);
    }
    renderAll(r&&r.id);
  });
  channel.on("presence",{event:"sync"},()=>{
    const names=Object.keys(channel.presenceState());
    document.getElementById("presenceTxt").textContent=names.length+" online";
    const av=document.getElementById("avatars"); av.innerHTML="";
    names.slice(0,6).forEach(nm=>{const s=document.createElement("span");s.textContent=initials(nm);s.title=nm;av.appendChild(s);});
  });
  channel.subscribe(async(status)=>{ if(status==="SUBSCRIBED"){ await channel.track({name:me,at:Date.now()}); }});
}
function initials(s){s=String(s).replace(/[._-]/g," ").trim();const p=s.split(/\s+/);
  const r=p.length>1?((p[0][0]||"")+(p[1][0]||"")):s.slice(0,2); return (r||"?").toUpperCase();}

async function setField(id,field,value){
  const i=rows.findIndex(r=>r.id===id); if(i<0) return;
  rows[i][field]=value; computeKpis();
  const patch={}; patch[field]=value; patch.updated_at=new Date().toISOString(); patch.updated_by=me;
  const {error}=await sb.from("clients").update(patch).eq("id",id);
  if(error) alert("Save error: "+error.message);
}

/* ===== Header (sortable) + per-column filters ===== */
function distinct(k){return [...new Set(rows.map(r=>(r[k]==null?"":String(r[k])).trim()).filter(v=>v))].sort();}
function buildHead(){
  const thead=document.getElementById("thead"); let h="<tr class='hrow'>";
  for(const c of COLS){ h+=`<th class="${c.k==='name'?'name ':''}sortable" data-col="${c.k}">${c.label}<span class="ar"></span></th>`; }
  h+="</tr><tr class='frow'>";
  for(const c of COLS){
    let ctl;
    if(c.type==='status') ctl=`<select class="fcol" data-col="${c.k}"><option value="">All</option><option>Yes</option><option>No</option><option>NA</option><option value="__blank">(Blank)</option></select>`;
    else if(c.type==='enum'){ const opts=distinct(c.k).map(v=>`<option>${esc(v)}</option>`).join(""); const extra=c.k==='owner'?`<option value="__none">Unassigned</option>`:""; ctl=`<select class="fcol" data-col="${c.k}"><option value="">All</option>${opts}${extra}</select>`; }
    else ctl=`<input class="fcol ft" data-col="${c.k}" placeholder="filter"/>`;
    h+=`<th class="${c.k==='name'?'name ':''}fcell">${ctl}</th>`;
  }
  h+="</tr>"; thead.innerHTML=h;
  document.querySelectorAll(".fcol").forEach(el=>{ if(colFilters[el.dataset.col]!=null) el.value=colFilters[el.dataset.col]; });
  updateSortArrows();
}
function updateSortArrows(){ document.querySelectorAll("th[data-col]").forEach(th=>{ const s=th.querySelector(".ar"); if(s) s.textContent = sort.k===th.dataset.col ? (sort.dir>0?" ▲":" ▼") : ""; }); }
function sortRows(list){
  if(!sort.k) return list; const c=COLS.find(x=>x.k===sort.k); if(!c) return list;
  return list.slice().sort((a,b)=>{
    let x=a[c.k], y=b[c.k];
    if(c.type==='status') return ((statusRank[x||""]??9)-(statusRank[y||""]??9))*sort.dir;
    x=(x==null?"":String(x)); y=(y==null?"":String(y));
    if(c.k==='fees'||c.k==='fees_received'){ const nx=parseFloat(x.replace(/[^0-9.\-]/g,"")), ny=parseFloat(y.replace(/[^0-9.\-]/g,"")); const hx=!isNaN(nx),hy=!isNaN(ny); if(hx||hy){ if(!hx)return 1; if(!hy)return -1; return (nx-ny)*sort.dir; } }
    return x.localeCompare(y)*sort.dir;
  });
}
function filtered(){
  const q=document.getElementById("q").value.trim().toLowerCase();
  const fs=document.getElementById("fStage").value;
  return rows.filter(r=>{
    if(q){const hay=((r.name||"")+" "+(r.code||"")+" "+(r.contact||"")).toLowerCase();if(!hay.includes(q))return false;}
    if(fs==="filed"){ if(r.filed!=="Yes") return false; }
    else if(fs==="notstarted"){ if(r.data_received==="Yes") return false; }
    else if(fs==="progress"){ if(!(r.data_received==="Yes"&&r.filed!=="Yes")) return false; }
    for(const c of COLS){
      const fv=colFilters[c.k]; if(!fv) continue;
      const cell=(r[c.k]==null?"":String(r[c.k]));
      if(c.type==='text'){ if(!cell.toLowerCase().includes(fv.toLowerCase())) return false; }
      else if(fv==='__blank'||fv==='__none'){ if(cell.trim()!=="") return false; }
      else if(cell!==fv) return false;
    }
    return true;
  });
}

/* ===== Rendering ===== */
function val(r,f){return r[f]||"";}
function statusClass(v){return v==="Yes"?"st-Yes":v==="No"?"st-No":v==="NA"?"st-NA":"st-none";}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function renderTable(flashId){
  const tb=document.getElementById("tbody"); const list=sortRows(filtered());
  tb.innerHTML="";
  for(const r of list){
    const tr=document.createElement("tr"); if(flashId&&r.id===flashId) tr.className="flash";
    let cells="";
    cells+=`<td class="name"><div class="nm">${esc(r.name)}</div><div class="cd">${esc(r.code||"")}</div></td>`;
    cells+=`<td>${esc(r.contact||"")}</td>`;
    cells+=`<td>${esc(r.itr_type||"")}</td>`;
    for(const [f] of STAGES){
      const v=val(r,f);
      cells+=`<td><select class="st-sel ${statusClass(v)}" data-id="${r.id}" data-f="${f}">`+
        ["","Yes","No","NA"].map(o=>`<option value="${o}"${o===v?" selected":""}>${o||"—"}</option>`).join("")+
        `</select></td>`;
    }
    cells+=`<td><input class="cell" data-id="${r.id}" data-f="fees" value="${esc(val(r,'fees'))}" placeholder="—"/></td>`;
    cells+=`<td><input class="cell" data-id="${r.id}" data-f="fees_received" value="${esc(val(r,'fees_received'))}" placeholder="—"/></td>`;
    cells+=`<td><select class="own-sel" data-id="${r.id}" data-f="owner"><option value="">Unassigned</option>`+
      OWNERS.map(o=>`<option${o===r.owner?" selected":""}>${o}</option>`).join("")+`</select></td>`;
    cells+=`<td><input class="cell rmk" data-id="${r.id}" data-f="remarks" value="${esc(val(r,'remarks'))}" placeholder="—"/></td>`;
    tr.innerHTML=cells; tb.appendChild(tr);
  }
  document.getElementById("count").textContent=list.length+" of "+rows.length+" shown";
}
function computeKpis(){
  const total=rows.length;
  const filed=rows.filter(r=>r.filed==="Yes").length;
  const prog=rows.filter(r=>r.data_received==="Yes"&&r.filed!=="Yes").length;
  const neu=rows.filter(r=>r.data_received!=="Yes").length;
  document.getElementById("kTotal").textContent=total;
  document.getElementById("kFiled").textContent=filed;
  document.getElementById("kProg").textContent=prog;
  document.getElementById("kNew").textContent=neu;
  const pipe=document.getElementById("pipe"); pipe.innerHTML="";
  STAGES.forEach(([f,label],idx)=>{
    const n=rows.filter(r=>r[f]==="Yes").length;
    const pct=total?Math.round(n/total*100):0;
    const done=idx===STAGES.length-1;
    pipe.innerHTML+=`<div class="st${done?' done':''}"><div class="n">${n}</div><div class="t">${label}</div>`+
      `<div class="bar"><i style="width:${pct}%"></i></div></div>`;
  });
}
function renderAll(flashId){ if(!headBuilt){ buildHead(); headBuilt=true; } computeKpis(); renderTable(flashId); }

/* ===== Events ===== */
document.addEventListener("change",(e)=>{
  const el=e.target;
  if(el.matches(".st-sel")){ el.className="st-sel "+statusClass(el.value); setField(+el.dataset.id,el.dataset.f,el.value); }
  else if(el.matches(".own-sel")){ setField(+el.dataset.id,el.dataset.f,el.value||null); }
  else if(el.matches("select.fcol")){ colFilters[el.dataset.col]=el.value; renderTable(); }
  else if(el.matches("#fStage")){ renderTable(); }
});
document.addEventListener("input",(e)=>{
  const el=e.target;
  if(el.matches("input.fcol")){ colFilters[el.dataset.col]=el.value; renderTable(); }
  else if(el.matches("#q")){ renderTable(); }
});
document.addEventListener("blur",(e)=>{
  const el=e.target;
  if(el.matches("input.cell")) setField(+el.dataset.id,el.dataset.f,el.value.trim()||null);
},true);
document.addEventListener("click",(e)=>{
  const th=e.target.closest && e.target.closest("th[data-col]");
  if(th){ const k=th.dataset.col; if(sort.k===k){ sort.dir=-sort.dir; } else { sort.k=k; sort.dir=1; } updateSortArrows(); renderTable(); }
});
function clearFilters(){ for(const k in colFilters) delete colFilters[k]; sort={k:null,dir:1};
  document.getElementById("q").value=""; document.getElementById("fStage").value="";
  document.querySelectorAll(".fcol").forEach(el=>el.value=""); updateSortArrows(); renderTable(); }

async function addClient(){
  const name=prompt("New client name:"); if(!name) return;
  const code=prompt("Client code (optional):")||null;
  const base={code,name,contact:null,itr_type:"ITR",data_received:null,data_written:null,tb_ready:null,
    tb_fed:null,comp_ready:null,tax_paid:null,filed:null,fees:null,fees_received:null,owner:null,remarks:null};
  const {data,error}=await sb.from("clients").insert(base).select().single();
  if(error){ alert(error.message); return; }
  rows.push(data); document.getElementById("q").value=""; renderAll(data.id);
}
function exportCsv(){
  const cols=["code","name","contact","itr_type",...STAGES.map(s=>s[0]),"fees","fees_received","owner","remarks"];
  const head=["Code","Name","Contact","Type","Data rcd","Data written","TB ready","TB fed","Comp ready","Tax paid","Filed","Fees","Fees rcvd","Owner","Remarks"];
  const csv=[head.join(",")].concat(rows.map(r=>cols.map(c=>{
    const v=(r[c]==null?"":String(r[c])); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;
  }).join(","))).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download="ITR_filing_export.csv"; a.click();
}
</script>
</body>
</html>
